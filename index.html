<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МойКласс · учительский ежедневник</title>
<style>
/* МойКласс — Учительский ежедневник */

@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* paper + ink */
  --paper: oklch(0.957 0.018 82);
  --paper-deep: oklch(0.928 0.022 78);
  --paper-card: oklch(0.975 0.015 84);
  --paper-edge: oklch(0.89 0.025 75);
  --ink: oklch(0.235 0.018 80);
  --ink-soft: oklch(0.40 0.018 80);
  --ink-faint: oklch(0.58 0.015 80);
  --rule: oklch(0.85 0.022 78);
  --rule-soft: oklch(0.90 0.020 78);

  /* signature greens */
  --forest: oklch(0.34 0.062 152);
  --forest-deep: oklch(0.26 0.055 152);
  --forest-soft: oklch(0.55 0.055 152);
  --moss: oklch(0.78 0.05 145);
  --moss-pale: oklch(0.92 0.035 140);

  /* accents */
  --ochre: oklch(0.74 0.13 72);
  --ochre-deep: oklch(0.58 0.13 60);
  --ochre-pale: oklch(0.93 0.04 80);
  --berry: oklch(0.52 0.13 25);
  --berry-pale: oklch(0.93 0.035 30);
  --sky: oklch(0.72 0.08 230);
  --sky-pale: oklch(0.93 0.025 225);
  --lilac: oklch(0.72 0.08 310);

  --r-sm: 6px;
  --r: 10px;
  --r-lg: 18px;

  --shadow-card: 0 1px 0 rgba(120, 90, 40, 0.06), 0 12px 28px -16px rgba(60, 50, 25, 0.20), 0 2px 6px -2px rgba(60, 50, 25, 0.08);
  --shadow-stamp: inset 0 0 0 1px rgba(60, 80, 50, 0.18);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: 'Manrope', system-ui, sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";

  /* paper grain */
  background-image:
    radial-gradient(circle at 20% 10%, oklch(0.93 0.028 60) 0%, transparent 35%),
    radial-gradient(circle at 85% 80%, oklch(0.94 0.022 140) 0%, transparent 40%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.2  0 0 0 0 0.18  0 0 0 0 0.12  0 0 0 0.07 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");
}

.font-serif { font-family: 'Instrument Serif', 'Cormorant Garamond', serif; font-weight: 400; letter-spacing: -0.01em; }
.font-mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; }
.italic { font-style: italic; }

/* ——— App Shell ——— */
.app {
  display: block;
  min-height: 100vh;
  padding-left: 248px;
  position: relative;
}

.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: 248px;
  height: 100vh;
  padding: 22px 18px 18px;
  border-right: 1px solid var(--rule);
  background:
    linear-gradient(180deg, oklch(0.945 0.025 76) 0%, oklch(0.93 0.028 78) 100%);
  display: flex; flex-direction: column;
  gap: 16px;
  z-index: 5;
  overflow-y: auto;
}
.sidebar::before {
  content: ""; position: absolute; top: 0; right: -1px; bottom: 0; width: 1px;
  background: repeating-linear-gradient(180deg, var(--rule) 0 6px, transparent 6px 12px);
  opacity: .5;
}

.brand {
  display: flex; align-items: baseline; gap: 8px;
  padding: 4px 6px 14px;
  border-bottom: 1px dashed var(--rule);
}
.brand-mark {
  width: 36px; height: 36px;
  background: var(--forest);
  color: var(--paper);
  border-radius: 50%;
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 22px;
  line-height: 1;
  box-shadow: var(--shadow-stamp), 0 0 0 3px var(--paper), 0 0 0 4px var(--rule);
  flex-shrink: 0;
  align-self: center;
}
.brand-name {
  font-family: 'Instrument Serif', serif;
  font-size: 26px;
  line-height: 1;
  letter-spacing: -0.01em;
}
.brand-name em { font-style: italic; color: var(--forest); }
.brand-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--ink-faint);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 2px;
}

.nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.nav-section {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faint);
  padding: 14px 10px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px;
  border-radius: var(--r);
  cursor: pointer;
  color: var(--ink-soft);
  font-weight: 500;
  font-size: 14px;
  position: relative;
  transition: background .15s, color .15s;
}
.nav-item:hover { background: oklch(0.91 0.025 80); color: var(--ink); }
.nav-item.active {
  background: var(--paper-card);
  color: var(--ink);
  box-shadow: var(--shadow-card);
}
.nav-item.active::before {
  content: ""; position: absolute; left: -3px; top: 8px; bottom: 8px; width: 3px;
  background: var(--forest);
  border-radius: 2px;
}
.nav-item .ico { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.6; }
.nav-item .badge {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: var(--berry);
  color: white;
  padding: 1px 6px;
  border-radius: 999px;
  font-weight: 500;
}

.sidebar-footer {
  border-top: 1px dashed var(--rule);
  padding-top: 14px;
  display: flex; align-items: center; gap: 10px;
}
.avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--ochre-pale);
  color: var(--ochre-deep);
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif;
  font-size: 17px;
  font-style: italic;
  box-shadow: var(--shadow-stamp);
}
.user-name { font-weight: 600; font-size: 13.5px; line-height: 1.2; }
.user-role { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint); letter-spacing: 0.1em; text-transform: uppercase; }

/* ——— Main ——— */
.main {
  min-width: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.topbar {
  padding: 22px 36px 0;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.topbar-title { min-width: 0; flex: 1 1 auto; }
.topbar-title h1 { white-space: nowrap; }
.topbar-title h1 {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: 44px;
  line-height: 1;
  margin: 0;
  letter-spacing: -0.015em;
}
.topbar-title h1 em { font-style: italic; color: var(--forest); }
.topbar-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-faint);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-top: 6px;
}
.topbar-actions { display: flex; gap: 10px; align-items: center; }

.content {
  padding: 28px 36px 60px;
  display: flex; flex-direction: column;
  gap: 24px;
}

/* ——— Buttons ——— */
.btn {
  font-family: 'Manrope', sans-serif;
  font-weight: 500;
  font-size: 13px;
  padding: 9px 16px;
  border-radius: 999px;
  border: 1px solid var(--rule);
  background: var(--paper-card);
  color: var(--ink);
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 7px;
  box-shadow: 0 1px 0 rgba(120, 90, 40, 0.04);
  transition: transform .12s, background .15s;
}
.btn:hover { background: var(--paper-deep); }
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--forest);
  color: var(--paper);
  border-color: var(--forest-deep);
}
.btn-primary:hover { background: var(--forest-deep); }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: oklch(0.91 0.025 80); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.icon-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--paper-card);
  border: 1px solid var(--rule);
  display: grid; place-items: center;
  cursor: pointer;
  color: var(--ink-soft);
}
.icon-btn:hover { background: var(--paper-deep); color: var(--ink); }
.icon-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; }

/* ——— Cards ——— */
.card {
  background: var(--paper-card);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  padding: 22px;
  position: relative;
}
.card-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
.card-title {
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  line-height: 1;
}
.card-title em { font-style: italic; color: var(--forest); }
.card-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

/* ——— Dashboard grid ——— */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.stat {
  padding: 18px 18px 16px;
  background: var(--paper-card);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  position: relative;
  overflow: hidden;
}
.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.stat-num {
  font-family: 'Instrument Serif', serif;
  font-size: 56px;
  line-height: 1;
  margin-top: 8px;
  letter-spacing: -0.02em;
}
.stat-num small {
  font-size: 18px;
  color: var(--ink-faint);
  font-style: italic;
  margin-left: 4px;
}
.stat-foot { margin-top: 10px; font-size: 12.5px; color: var(--ink-soft); }
.stat-foot .delta-up { color: var(--forest); font-weight: 600; }
.stat-foot .delta-down { color: var(--berry); font-weight: 600; }
.stat .ornament {
  position: absolute; top: 14px; right: 14px;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px dashed var(--rule);
  display: grid; place-items: center;
  color: var(--ink-faint);
}

.dash-2col {
  display: grid;
  grid-template-columns: 1.45fr 1fr;
  gap: 18px;
}

/* Today's lesson list */
.today-list { display: flex; flex-direction: column; }
.lesson-row {
  display: grid;
  grid-template-columns: 76px 1fr auto;
  align-items: center;
  gap: 14px;
  padding: 14px 4px;
  border-top: 1px dashed var(--rule);
}
.lesson-row:first-child { border-top: none; }
.lesson-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 17px;
  color: var(--ink);
  font-weight: 500;
}
.lesson-time .dur { display: block; font-size: 10px; color: var(--ink-faint); letter-spacing: 0.1em; margin-top: 2px; }
.lesson-meta-line { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.lesson-name { font-weight: 600; font-size: 14.5px; }
.lesson-sub { font-size: 12px; color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; }
.lesson-topic { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 16px; color: var(--ink-soft); margin-top: 2px; }
.lesson-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--moss-pale);
  color: var(--forest-deep);
}
.lesson-status.next { background: var(--ochre-pale); color: var(--ochre-deep); }
.lesson-status.done { background: oklch(0.92 0.012 80); color: var(--ink-faint); }

/* Alerts */
.alerts { display: flex; flex-direction: column; gap: 0; }
.alert-row {
  display: flex; gap: 12px;
  padding: 14px 4px;
  border-top: 1px dashed var(--rule);
  align-items: flex-start;
}
.alert-row:first-child { border-top: none; }
.alert-dot {
  width: 8px; height: 8px; border-radius: 50%;
  margin-top: 6px; flex-shrink: 0;
  background: var(--ochre);
}
.alert-dot.warn { background: var(--berry); }
.alert-dot.info { background: var(--forest); }
.alert-text { flex: 1; font-size: 13px; line-height: 1.45; color: var(--ink); }
.alert-text strong { font-weight: 600; }
.alert-text .meta { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint); letter-spacing: 0.1em; margin-top: 3px; }
.alert-act {
  background: none; border: none; cursor: pointer;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--forest);
  border-bottom: 1px solid var(--forest);
  padding: 0 0 1px 0;
  align-self: flex-start;
  margin-top: 2px;
}

/* Hero card — "Today" */
.today-hero {
  background:
    linear-gradient(180deg, oklch(0.30 0.058 152) 0%, oklch(0.26 0.055 152) 100%);
  color: oklch(0.95 0.022 82);
  border: 1px solid var(--forest-deep);
  border-radius: var(--r-lg);
  padding: 28px 28px 24px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-card);
}
.today-hero::after {
  /* corner stamp */
  content: ""; position: absolute; top: 14px; right: 18px;
  width: 84px; height: 84px;
  border-radius: 50%;
  border: 1px dashed oklch(0.95 0.022 82 / 0.3);
}
.today-hero .eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: oklch(0.95 0.022 82 / 0.6);
}
.today-hero .date {
  font-family: 'Instrument Serif', serif;
  font-size: 52px;
  line-height: 1;
  margin-top: 8px;
}
.today-hero .date em { font-style: italic; color: var(--moss); }
.today-hero .weekday { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.15em; text-transform: uppercase; font-size: 11px; margin-top: 10px; color: oklch(0.95 0.022 82 / 0.7); }
.today-hero .summary {
  margin-top: 22px;
  display: flex; gap: 22px;
  border-top: 1px solid oklch(0.95 0.022 82 / 0.18);
  padding-top: 18px;
}
.today-hero .summary > div { display: flex; flex-direction: column; gap: 4px; }
.today-hero .summary .n { font-family: 'Instrument Serif', serif; font-size: 30px; line-height: 1; }
.today-hero .summary .l { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.15em; text-transform: uppercase; color: oklch(0.95 0.022 82 / 0.6); }
.today-hero .corner-stamp {
  position: absolute; top: 28px; right: 32px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--ochre);
  color: var(--forest-deep);
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 26px;
  transform: rotate(-8deg);
  box-shadow: inset 0 0 0 1px rgba(40,40,20,0.25);
  z-index: 1;
}

/* Mini calendar week strip */
.weekstrip {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-top: 18px;
}
.weekstrip-day {
  text-align: center;
  padding: 8px 4px 10px;
  border: 1px solid oklch(0.95 0.022 82 / 0.18);
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: oklch(0.95 0.022 82 / 0.6);
  letter-spacing: 0.1em;
}
.weekstrip-day .num { display: block; font-family: 'Instrument Serif', serif; font-size: 22px; color: oklch(0.95 0.022 82); margin-top: 4px; }
.weekstrip-day.today { background: var(--ochre); color: var(--forest-deep); border-color: var(--ochre); }
.weekstrip-day.today .num { color: var(--forest-deep); }

/* —— Students —— */
.students-shell { display: grid; grid-template-columns: 360px 1fr; gap: 24px; align-items: start; }
.students-list-card {
  padding: 0; overflow: hidden;
  position: sticky; top: 24px;
  max-height: calc(100vh - 48px);
  display: flex; flex-direction: column;
}
.students-search {
  padding: 14px 18px;
  border-bottom: 1px dashed var(--rule);
  display: flex; align-items: center; gap: 10px;
}
.students-search input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  color: var(--ink);
}
.students-search input::placeholder { color: var(--ink-faint); font-style: italic; font-family: 'Instrument Serif', serif; }
.students-search .count {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-faint); letter-spacing: 0.12em; text-transform: uppercase;
}

.students-list { flex: 1; overflow-y: auto; min-height: 0; }
.student-card {
  display: grid;
  grid-template-columns: 6px 44px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 14px 18px 14px 0;
  border-top: 1px solid var(--rule-soft);
  cursor: pointer;
  position: relative;
  transition: background .15s;
}
.student-card:first-child { border-top: none; }
.student-card:hover { background: oklch(0.95 0.022 78); }
.student-card.active { background: var(--moss-pale); }
.student-card .spine {
  width: 6px;
  align-self: stretch;
  background: var(--bookspine, var(--forest));
}
.student-card .av {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--paper-deep);
  color: var(--ink-soft);
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 20px;
  box-shadow: var(--shadow-stamp);
}
.student-name { font-weight: 600; font-size: 14.5px; }
.student-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.1em;
  margin-top: 2px;
}
.student-card .right { text-align: right; }
.student-card .pack-pill {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  background: var(--moss-pale); color: var(--forest-deep);
  padding: 3px 8px; border-radius: 999px;
  display: inline-block; font-weight: 600;
}
.student-card .pack-pill.low { background: var(--ochre-pale); color: var(--ochre-deep); }
.student-card .pack-pill.empty { background: var(--berry-pale); color: var(--berry); }

/* Student profile */
.profile { padding: 0; overflow: hidden; }
.profile-head {
  padding: 28px 28px 22px;
  position: relative;
  border-bottom: 1px solid var(--rule);
  background:
    radial-gradient(ellipse at top right, oklch(0.94 0.04 80) 0%, transparent 60%);
}
.profile-head .lib-tag {
  position: absolute; top: 22px; right: 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-align: right;
}
.profile-head .lib-tag .num { font-size: 22px; color: var(--ink); letter-spacing: 0.05em; font-family: 'Instrument Serif', serif; }
.profile-top { display: flex; align-items: center; gap: 18px; padding-right: 130px; min-width: 0; }
.profile-top > .profile-av { flex: 0 0 auto; }
.profile-top > div + div { min-width: 0; flex: 1; }
.profile-name { font-family: 'Instrument Serif', serif; font-size: 42px; line-height: 1; overflow-wrap: anywhere; }
.profile-av {
  width: 76px; height: 76px; border-radius: 50%;
  background: var(--bookspine);
  color: var(--paper-card);
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 36px;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15), 0 0 0 4px var(--paper-card), 0 0 0 5px var(--rule);
  flex-shrink: 0;
}
.profile-name em { font-style: italic; color: var(--forest); }
.profile-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); margin-top: 6px; }
.profile-meta b { color: var(--ink); font-weight: 500; }

.profile-tabs { display: flex; gap: 4px; padding: 14px 24px 0; border-bottom: 1px solid var(--rule); }
.tab {
  padding: 10px 14px 12px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-faint);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.tab.active { color: var(--ink); border-bottom-color: var(--forest); }

.profile-body { padding: 22px 28px 28px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 28px; }
.profile-section { }
.section-h {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px dashed var(--rule);
}
.section-h h3 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 22px; line-height: 1; margin: 0; }
.section-h h3 em { font-style: italic; color: var(--forest); }
.section-h .tag { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint); letter-spacing: 0.14em; text-transform: uppercase; }

/* package stamp grid */
.pack {
  border: 1px solid var(--rule);
  border-radius: 14px;
  padding: 18px;
  background: linear-gradient(180deg, var(--paper-card) 0%, oklch(0.95 0.022 78) 100%);
}
.pack-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; }
.pack-num {
  font-family: 'Instrument Serif', serif;
  font-size: 38px;
  line-height: 1;
}
.pack-num em { font-style: italic; }
.pack-of { color: var(--ink-faint); font-style: italic; }
.pack-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); }
.stamps {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 8px;
}
.stamp {
  aspect-ratio: 1;
  border-radius: 50%;
  border: 1.5px dashed var(--rule);
  display: grid; place-items: center;
  position: relative;
}
.stamp.used {
  background: var(--forest);
  color: var(--paper);
  border: none;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 16px;
  transform: rotate(var(--rot, -5deg));
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);
}
.stamp.next { border-color: var(--ochre); border-style: solid; color: var(--ochre-deep); font-family: 'JetBrains Mono', monospace; font-size: 10px; }
.pack-foot {
  margin-top: 14px; padding-top: 12px;
  border-top: 1px dashed var(--rule);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px; color: var(--ink-soft);
}

/* timeline */
.timeline { position: relative; padding-left: 22px; }
.timeline::before {
  content: ""; position: absolute; left: 6px; top: 8px; bottom: 8px; width: 1px;
  background: repeating-linear-gradient(180deg, var(--rule) 0 4px, transparent 4px 8px);
}
.tl-item { position: relative; padding: 6px 0 16px; }
.tl-item::before {
  content: ""; position: absolute; left: -22px; top: 10px;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--paper-card);
  border: 2px solid var(--forest);
}
.tl-item.missed::before { border-color: var(--berry); }
.tl-item.canceled::before { border-color: var(--ink-faint); background: var(--paper-card); }
.tl-item.upcoming::before { border-style: dashed; background: var(--paper-card); }
.tl-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-faint); letter-spacing: 0.1em; }
.tl-title { font-weight: 600; font-size: 14px; margin-top: 2px; }
.tl-note { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 14.5px; color: var(--ink-soft); margin-top: 4px; }

/* skill bars */
.skills { display: flex; flex-direction: column; gap: 14px; }
.skill { }
.skill-row { display: flex; justify-content: space-between; align-items: baseline; }
.skill-name { font-size: 13.5px; font-weight: 500; }
.skill-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-faint); }
.skill-bar { margin-top: 6px; height: 8px; background: var(--paper-deep); border-radius: 999px; overflow: hidden; position: relative; }
.skill-bar > span {
  display: block; height: 100%;
  background: linear-gradient(90deg, var(--forest) 0%, var(--moss) 100%);
  border-radius: 999px;
}
.skill-bar.ochre > span { background: linear-gradient(90deg, var(--ochre-deep) 0%, var(--ochre) 100%); }
.skill-bar.berry > span { background: linear-gradient(90deg, var(--berry) 0%, oklch(0.7 0.1 25) 100%); }

/* —— Schedule —— */
.schedule-grid {
  background: var(--paper-card);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  padding: 18px;
  overflow-x: auto;
  overflow-y: hidden;
}
.schedule-grid > * { min-width: 720px; }
.sched-head {
  display: grid; grid-template-columns: 72px repeat(6, 1fr);
  gap: 8px;
  padding-bottom: 12px;
  border-bottom: 1px dashed var(--rule);
}
.sched-head .day {
  font-family: 'Instrument Serif', serif;
  display: flex; flex-direction: column;
  align-items: flex-start;
  padding: 4px 6px;
  border-radius: 8px;
}
.sched-head .day.today { background: var(--moss-pale); }
.sched-head .day .wd { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); }
.sched-head .day .dn { font-size: 26px; line-height: 1; margin-top: 2px; }
.sched-head .day.today .dn { color: var(--forest); }

.sched-body { display: grid; grid-template-columns: 72px repeat(6, 1fr); gap: 8px; margin-top: 12px; position: relative; }
.sched-times { display: flex; flex-direction: column; gap: 0; }
.sched-time {
  height: 64px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
  padding-top: 0;
  text-align: right;
  padding-right: 8px;
  border-top: 1px dashed var(--rule);
  position: relative;
}
.sched-time:first-child { border-top: none; }
.sched-col {
  position: relative;
  border-left: 1px solid var(--rule-soft);
  padding: 0 4px;
}
.sched-col .hour-line {
  position: absolute; left: 0; right: 0; height: 1px; background: var(--rule-soft);
}
.sched-block {
  position: absolute;
  left: 4px; right: 4px;
  border-radius: 8px;
  padding: 8px 10px 6px;
  font-size: 12px;
  border: 1px solid var(--rule);
  box-shadow: 0 1px 0 rgba(80, 60, 25, 0.06), 0 4px 10px -6px rgba(60, 50, 25, 0.18);
  background: var(--moss-pale);
  border-color: oklch(0.78 0.05 145);
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow .15s, filter .15s;
}
.sched-block:hover { box-shadow: 0 4px 16px -4px rgba(60,50,25,.25); filter: brightness(0.97); }
.sched-block.ochre { background: var(--ochre-pale); border-color: oklch(0.83 0.08 78); }
.sched-block.sky { background: var(--sky-pale); border-color: oklch(0.82 0.06 225); }
.sched-block.berry { background: var(--berry-pale); border-color: oklch(0.84 0.05 30); }
.sched-block.violet { background: oklch(0.93 0.03 305); border-color: oklch(0.85 0.05 305); }
.sched-block.canceled { background: oklch(0.93 0.012 80); border-color: var(--rule); color: var(--ink-faint); text-decoration: line-through; }
.sched-block .t { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; opacity: 0.7; }
.sched-block .n { font-weight: 600; font-size: 12.5px; line-height: 1.2; margin-top: 2px; }
.sched-block .topic { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 13px; line-height: 1.2; margin-top: 1px; opacity: 0.8; }
.sched-block.group { background: oklch(0.94 0.05 145); border-color: oklch(0.78 0.06 150); }
.sched-block.group .n::before { content: "◗ "; }

.sched-now {
  position: absolute; left: 72px; right: 0; height: 2px;
  background: var(--berry);
  z-index: 3; pointer-events: none;
}
.sched-now::before {
  content: ""; position: absolute; left: -6px; top: -3px;
  width: 8px; height: 8px; border-radius: 50%; background: var(--berry);
}
.sched-now-label {
  position: absolute; right: 8px; top: -8px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  background: var(--berry); color: white;
  padding: 1px 6px; border-radius: 4px;
}

/* —— Attendance —— */
.attendance-table {
  background: var(--paper-card);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  padding: 0;
  overflow-x: auto;
  overflow-y: hidden;
}
.attendance-table > .att-grid { min-width: 900px; }
.attendance-table > .att-toolbar,
.attendance-table > .att-legend { min-width: 900px; }
.att-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 22px;
  border-bottom: 1px dashed var(--rule);
}
.att-toolbar .grow { flex: 1; }
.att-tabs { display: flex; gap: 4px; }
.att-tab {
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  color: var(--ink-faint);
  cursor: pointer;
  font-weight: 500;
}
.att-tab.active { background: var(--ink); color: var(--paper-card); }

.att-grid {
  display: grid;
  grid-template-columns: 240px repeat(14, 1fr) 120px;
  gap: 0;
  font-size: 12px;
}
.att-grid > * { padding: 10px 8px; border-top: 1px solid var(--rule-soft); }
.att-grid > .att-h {
  border-top: none;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.1em;
  text-align: center;
  padding: 14px 4px 14px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 48px;
}
.att-grid > .att-h.name { text-align: center; padding-left: 0; padding-right: 0; }
.att-grid > .att-h .wd { display: block; opacity: 0.6; font-size: 9px; }
.att-grid > .att-name {
  display: flex; align-items: center; gap: 10px;
  padding-left: 22px;
  font-weight: 500;
}
.att-grid > .att-name .av {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--paper-deep);
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 14px;
  flex-shrink: 0;
}
.att-cell {
  display: grid; place-items: center;
  text-align: center;
}
.att-mark {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--paper-card);
}
.att-mark.present { background: var(--forest); }
.att-mark.late { background: var(--ochre-deep); }
.att-mark.absent { background: var(--berry); }
.att-mark.makeup { background: var(--sky); color: var(--ink); font-family: 'JetBrains Mono', monospace; font-size: 10px; }
.att-mark.skip { background: transparent; border: 1px dashed var(--rule); color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; font-size: 10px; }
.att-grid > .att-rate {
  text-align: center;
  padding-left: 0; padding-right: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.att-rate .ring {
  width: 28px; height: 28px;
  background: conic-gradient(var(--forest) calc(var(--p) * 1%), var(--paper-deep) 0);
  border-radius: 50%;
  display: grid; place-items: center;
  position: relative;
}
.att-rate .ring::after {
  content: ""; position: absolute; inset: 3px;
  background: var(--paper-card); border-radius: 50%;
}
.att-rate .ring > span { position: relative; z-index: 1; font-size: 10px; font-weight: 600; }

/* legend */
.att-legend {
  display: flex; gap: 18px; padding: 12px 22px;
  border-top: 1px dashed var(--rule);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  align-items: center;
}
.att-legend .item { display: flex; align-items: center; gap: 6px; }

/* —— Groups —— */
.groups-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
}
.group-card {
  background: var(--paper-card);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  padding: 22px;
  box-shadow: var(--shadow-card);
  position: relative;
  overflow: hidden;
}
.group-card .ribbon {
  position: absolute; top: 14px; right: -32px;
  background: var(--bookspine, var(--forest));
  color: var(--paper-card);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 4px 38px;
  transform: rotate(35deg);
  box-shadow: 0 4px 8px -4px rgba(40, 35, 15, 0.3);
}
.group-card h3 {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: 28px;
  margin: 0;
  line-height: 1;
  padding-right: 60px;
}
.group-card h3 em { font-style: italic; color: var(--forest); }
.group-meta { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-faint); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 8px; }
.group-stats {
  display: flex; gap: 16px; margin-top: 18px;
  padding-top: 14px; border-top: 1px dashed var(--rule);
}
.group-stats .s { display: flex; flex-direction: column; }
.group-stats .n { font-family: 'Instrument Serif', serif; font-size: 24px; line-height: 1; white-space: nowrap; }
.group-stats .l { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--ink-faint); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; }

.group-roster { margin-top: 16px; }
.roster-avs {
  display: flex; align-items: center;
}
.roster-avs .av {
  width: 30px; height: 30px;
  border-radius: 50%;
  margin-left: -8px;
  background: var(--paper-deep);
  border: 2px solid var(--paper-card);
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-soft);
}
.roster-avs .av:first-child { margin-left: 0; }
.roster-avs .more {
  margin-left: -8px;
  height: 30px; min-width: 30px;
  padding: 0 8px;
  border-radius: 999px;
  background: var(--forest);
  color: var(--paper-card);
  border: 2px solid var(--paper-card);
  display: grid; place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
}
.group-times {
  margin-top: 14px;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.time-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 3px 9px;
  border: 1px solid var(--rule);
  border-radius: 999px;
  color: var(--ink-soft);
}
.time-chip.hot { background: var(--moss-pale); border-color: oklch(0.78 0.05 145); color: var(--forest-deep); }

/* —— Misc —— */
.divider {
  height: 1px;
  background: repeating-linear-gradient(90deg, var(--rule) 0 4px, transparent 4px 8px);
  margin: 8px 0;
}
.serif-display { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.01em; }

.mini-cal {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
}
.mini-cal .h { text-align: center; color: var(--ink-faint); padding: 2px 0; letter-spacing: 0.1em; }
.mini-cal .d {
  aspect-ratio: 1; display: grid; place-items: center;
  border-radius: 6px;
  background: var(--paper-deep);
  color: var(--ink);
}
.mini-cal .d.dim { background: transparent; color: var(--ink-faint); }
.mini-cal .d.has { background: var(--moss-pale); color: var(--forest-deep); font-weight: 600; }
.mini-cal .d.today { background: var(--forest); color: var(--paper-card); }

/* —— Pill —— */
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: 0.08em;
  padding: 3px 9px;
  border-radius: 999px;
  background: var(--paper-deep);
  color: var(--ink-soft);
  text-transform: uppercase;
}
.pill.green { background: var(--moss-pale); color: var(--forest-deep); }
.pill.ochre { background: var(--ochre-pale); color: var(--ochre-deep); }
.pill.berry { background: var(--berry-pale); color: var(--berry); }
.pill.dot::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* page header tabs (for attendance / schedule) */
.seg {
  display: inline-flex;
  background: var(--paper-card);
  border: 1px solid var(--rule);
  border-radius: 999px;
  padding: 3px;
  box-shadow: var(--shadow-card);
}
.seg button {
  background: none; border: none;
  padding: 6px 14px;
  border-radius: 999px;
  font-family: 'Manrope', sans-serif;
  font-size: 12.5px;
  color: var(--ink-soft);
  cursor: pointer;
}
.seg button.on {
  background: var(--ink);
  color: var(--paper-card);
}

/* —— Parent card page —— */
.parent-wrap {
  min-height: 100vh;
  display: grid; place-items: center;
  padding: 40px 20px;
}
.parent-card-outer {
  width: min(440px, 100%);
}
.parent-card {
  background: var(--paper-card);
  border-radius: 24px;
  padding: 30px 30px 28px;
  box-shadow:
    0 1px 0 rgba(120, 90, 40, 0.06),
    0 30px 80px -30px rgba(60, 50, 25, 0.35),
    0 8px 20px -8px rgba(60, 50, 25, 0.15);
  border: 1px solid var(--rule);
  position: relative;
  overflow: hidden;
}
.parent-card .perf {
  position: absolute; top: 0; bottom: 0; left: 50%;
  width: 1px;
  background: repeating-linear-gradient(180deg, var(--rule) 0 4px, transparent 4px 8px);
  opacity: .2;
}
.parent-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding-bottom: 18px; border-bottom: 1px dashed var(--rule);
}
.parent-brand {
  font-family: 'Instrument Serif', serif;
  font-size: 18px;
  line-height: 1.1;
}
.parent-brand em { font-style: italic; color: var(--forest); }
.parent-brand small { display: block; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); margin-top: 4px; }
.parent-stamp {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 2px solid var(--forest);
  color: var(--forest);
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 11px;
  line-height: 1.05;
  text-align: center;
  transform: rotate(-9deg);
  letter-spacing: 0.04em;
  padding: 4px;
}

.parent-name-row {
  margin-top: 22px;
  display: flex; align-items: center; gap: 16px;
}
.parent-av {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--bookspine, var(--forest));
  color: var(--paper-card);
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 32px;
  flex-shrink: 0;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
}
.parent-name { font-family: 'Instrument Serif', serif; font-size: 36px; line-height: 1; }
.parent-name em { font-style: italic; color: var(--forest); }
.parent-sub { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.12em; color: var(--ink-faint); text-transform: uppercase; margin-top: 6px; }

.parent-section { padding: 18px 0; border-top: 1px dashed var(--rule); }
.parent-section h4 {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-faint); margin: 0 0 12px; font-weight: 500;
}
.parent-pack {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 8px;
}
.parent-pack .big {
  font-family: 'Instrument Serif', serif; font-size: 60px; line-height: 1; letter-spacing: -0.02em;
}
.parent-pack .big em { font-style: italic; color: var(--forest); }
.parent-pack .big small { color: var(--ink-faint); font-style: italic; font-size: 24px; }
.parent-pack .right { text-align: right; }
.parent-pack .right .l { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint); letter-spacing: 0.12em; text-transform: uppercase; }
.parent-pack .right .d { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 18px; }

.parent-stamps {
  margin-top: 16px;
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px;
}

.parent-next {
  display: grid; grid-template-columns: auto 1fr; gap: 18px;
  align-items: center;
}
.parent-next .when {
  font-family: 'Instrument Serif', serif;
  font-size: 38px;
  line-height: 1;
  text-align: center;
}
.parent-next .when small { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); margin-top: 6px; }
.parent-next .what {
  border-left: 1px dashed var(--rule);
  padding-left: 18px;
}
.parent-next .what .topic { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 22px; line-height: 1.1; }
.parent-next .what .time { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-soft); margin-top: 6px; }

.parent-progress { display: flex; flex-direction: column; gap: 12px; }
.parent-note {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 18px;
  line-height: 1.4;
  color: var(--ink);
  padding: 4px 4px 12px;
  position: relative;
}
.parent-note::before {
  content: "«";
  font-family: 'Instrument Serif', serif;
  font-size: 56px;
  line-height: 1;
  position: absolute;
  left: -8px; top: -10px;
  color: var(--ochre);
  opacity: 0.5;
}
.parent-note-sig { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); }

.parent-footer {
  margin-top: 12px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.12em; text-transform: uppercase;
}

/* —— Locked overlay —— */
.lock-overlay {
  position: fixed; inset: 0;
  background: oklch(0.96 0.018 82 / 0.92);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: grid; place-items: center;
  text-align: center;
  padding: 20px;
}
.lock-card {
  background: var(--paper-card);
  border: 1px solid var(--rule);
  border-radius: 18px;
  padding: 32px 28px;
  max-width: 360px;
  box-shadow: var(--shadow-card);
}
.lock-card .ic { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 40px; color: var(--berry); }
.lock-card h3 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 26px; margin: 8px 0 6px; }
.lock-card p { font-size: 13px; color: var(--ink-soft); }

/* —— Toast notifications —— */
.toast-stack {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column-reverse; gap: 8px;
  z-index: 200;
  pointer-events: none;
}
.toast {
  background: var(--ink);
  color: var(--paper);
  padding: 10px 18px 10px 14px;
  border-radius: 999px;
  font-size: 13px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 16px 40px -16px rgba(0,0,0,0.5), 0 2px 8px -2px rgba(0,0,0,0.2);
  animation: toast-in .25s ease-out;
  max-width: 90vw;
  pointer-events: auto;
}
.toast .toast-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--moss);
  flex-shrink: 0;
}
.toast em { font-family: 'Instrument Serif', serif; font-style: italic; color: var(--moss); }
@keyframes toast-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* —— Tweak overrides —— */
.headers-sans h1,
.headers-sans .card-title,
.headers-sans .brand-name,
.headers-sans .profile-name,
.headers-sans .pack-num,
.headers-sans .stat-num,
.headers-sans .group-card h3,
.headers-sans .parent-name,
.headers-sans .topbar-title h1,
.headers-sans .section-h h3,
.headers-sans .today-hero .date {
  font-family: 'Manrope', sans-serif !important;
  font-weight: 700 !important;
  letter-spacing: -0.025em !important;
  font-style: normal !important;
}
.headers-sans h1 em,
.headers-sans .card-title em,
.headers-sans .brand-name em,
.headers-sans .profile-name em,
.headers-sans .topbar-title h1 em,
.headers-sans .section-h h3 em,
.headers-sans .today-hero .date em,
.headers-sans .group-card h3 em,
.headers-sans .parent-name em {
  font-style: normal !important;
}
.no-stamps .stamps,
.no-stamps .parent-stamps { display: none; }

/* —— Responsive —— */
@media (max-width: 1180px) {
  .dash-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-2col { grid-template-columns: 1fr; }
  .students-shell { grid-template-columns: 300px 1fr; }
  .students-list-card { max-height: calc(100vh - 48px); }
  .profile-body { grid-template-columns: 1fr; }
  .groups-grid { grid-template-columns: repeat(2, 1fr); }
  .topbar-title h1 { font-size: 36px; }
  .profile-name { font-size: 34px; }
  .student-card { grid-template-columns: 6px 36px 1fr auto; gap: 10px; padding: 12px 14px 12px 0; }
  .student-card .av { width: 36px; height: 36px; font-size: 16px; }
  .student-name { font-size: 13.5px; }
}

@media (max-width: 980px) {
  .students-shell { grid-template-columns: 1fr; }
  .students-list-card { position: static; max-height: none; }
  .students-list { max-height: 380px; }
}

@media (max-width: 840px) {
  .app { padding-left: 0; padding-top: 64px; }
  .sidebar {
    position: fixed; top: 0; left: 0; right: 0; bottom: auto;
    width: auto;
    height: auto; min-height: 0;
    flex-direction: row; align-items: center;
    padding: 12px 16px; gap: 12px;
    border-right: none; border-bottom: 1px solid var(--rule);
    overflow-x: auto;
    overflow-y: hidden;
  }
  .sidebar::before { display: none; }
  .brand { padding: 0; border: none; border-right: 1px dashed var(--rule); padding-right: 14px; }
  .brand-name { font-size: 22px; }
  .brand-sub { display: none; }
  .nav { flex-direction: row; gap: 4px; }
  .nav-section { display: none; }
  .nav-item { padding: 6px 10px; font-size: 13px; }
  .nav-item .badge { display: none; }
  .nav-item.active::before { display: none; }
  .nav-item .label { display: none; }
  .nav-item .ico { width: 20px; height: 20px; }
  .nav-item.active { background: var(--moss-pale); }
  .sidebar-footer { display: none; }
  .topbar { padding: 14px 18px 0; flex-wrap: wrap; }
  .topbar-title h1 { font-size: 30px; }
  .content { padding: 18px 18px 60px; gap: 16px; }
  .stat-num { font-size: 42px; }
  .students-shell { grid-template-columns: 1fr; }
  .students-list { max-height: 50vh; }
  .att-grid { font-size: 10px; }
  .att-grid { grid-template-columns: 140px repeat(14, 1fr) 80px; }
  .groups-grid { grid-template-columns: 1fr; }
  .schedule-grid { overflow-x: auto; }
  .sched-head, .sched-body { min-width: 720px; }
  .profile-name { font-size: 30px; }
  .today-hero .date { font-size: 36px; }
  .today-hero .corner-stamp { width: 44px; height: 44px; font-size: 20px; }
  .lesson-row { grid-template-columns: 60px 1fr; }
  .lesson-row .lesson-status { grid-column: 1 / -1; justify-self: start; }
}


/* ——— Sheet / Modal ——— */
.sheet-scrim {
  position: fixed; inset: 0;
  background: oklch(0.18 0.02 80 / 0.32);
  backdrop-filter: blur(2px);
  z-index: 90;
  animation: scrim-in .18s ease;
}
@keyframes scrim-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes sheet-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes modal-in { from { transform: scale(.97) translateY(8px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

.sheet {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(560px, 95vw);
  background: var(--paper);
  border-left: 1px solid var(--rule);
  box-shadow: -24px 0 48px -20px rgba(40,30,15,.18);
  z-index: 100;
  display: flex; flex-direction: column;
  animation: sheet-in .22s cubic-bezier(.4,.0,.2,1);
  background-image:
    radial-gradient(circle at 90% 5%, oklch(0.93 0.028 60) 0%, transparent 35%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.2  0 0 0 0 0.18  0 0 0 0 0.12  0 0 0 0.07 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");
}
.sheet-head {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 22px 28px 16px;
  border-bottom: 1px solid var(--rule);
  background: linear-gradient(180deg, oklch(0.96 0.022 78) 0%, transparent 100%);
}
.sheet-head .eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: .16em; color: var(--ink-faint);
  text-transform: uppercase;
}
.sheet-head h2 {
  font-family: 'Instrument Serif', serif;
  font-weight: 400; font-size: 30px; line-height: 1;
  margin: 4px 0 0; color: var(--ink);
}
.sheet-head h2 em { color: var(--forest); }
.sheet-close {
  margin-left: auto;
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--rule);
  background: var(--paper-card);
  color: var(--ink-soft);
  cursor: pointer;
  display: grid; place-items: center;
  flex-shrink: 0;
  transition: background .15s, color .15s;
}
.sheet-close:hover { background: var(--berry-pale); color: var(--berry); border-color: var(--berry); }
.sheet-body {
  flex: 1; overflow-y: auto;
  padding: 22px 28px 28px;
}
.sheet-foot {
  padding: 16px 28px;
  border-top: 1px solid var(--rule);
  background: linear-gradient(0deg, oklch(0.96 0.022 78) 0%, transparent 100%);
  display: flex; gap: 10px; justify-content: flex-end;
  align-items: center;
}
.sheet-foot .grow { flex: 1; }

.modal-scrim {
  position: fixed; inset: 0;
  background: oklch(0.18 0.02 80 / 0.32);
  backdrop-filter: blur(2px);
  z-index: 90;
  display: grid; place-items: center;
  animation: scrim-in .18s ease;
  padding: 24px;
}
.modal {
  width: min(480px, 100%);
  background: var(--paper);
  border-radius: var(--r-lg);
  border: 1px solid var(--rule);
  box-shadow: var(--shadow-card), 0 24px 60px -12px rgba(40,30,15,.30);
  animation: modal-in .22s cubic-bezier(.4,.0,.2,1);
  overflow: hidden;
}
.modal-head { padding: 22px 24px 14px; border-bottom: 1px solid var(--rule); }
.modal-head .eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: .16em; color: var(--ink-faint);
  text-transform: uppercase;
}
.modal-head h2 {
  font-family: 'Instrument Serif', serif; font-weight: 400;
  font-size: 26px; line-height: 1.1; margin: 4px 0 0;
}
.modal-head h2 em { color: var(--forest); }
.modal-body { padding: 18px 24px 4px; }
.modal-foot { padding: 14px 24px 18px; display: flex; gap: 10px; justify-content: flex-end; }

/* form fields */
.fld { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.fld label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .14em; color: var(--ink-faint);
  text-transform: uppercase;
}
.fld input, .fld select, .fld textarea {
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  padding: 10px 12px;
  border: 1px solid var(--rule);
  border-radius: 8px;
  background: var(--paper-card);
  color: var(--ink);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.fld input:focus, .fld select:focus, .fld textarea:focus {
  border-color: var(--forest);
  box-shadow: 0 0 0 3px oklch(0.78 0.05 145 / 0.25);
}
.fld textarea { resize: vertical; min-height: 80px; font-family: 'Instrument Serif', serif; font-style: italic; font-size: 17px; line-height: 1.4; }
.fld-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.choices { display: flex; gap: 8px; flex-wrap: wrap; }
.choice {
  padding: 8px 12px;
  border: 1px solid var(--rule);
  border-radius: 999px;
  background: var(--paper-card);
  cursor: pointer;
  font-size: 12.5px;
  color: var(--ink-soft);
  transition: all .15s;
  font-family: 'Manrope', sans-serif;
}
.choice:hover { border-color: var(--forest-soft); color: var(--ink); }
.choice.on {
  background: var(--forest);
  color: oklch(0.97 0.02 85);
  border-color: var(--forest);
}
.choice .ico { vertical-align: middle; margin-right: 4px; }

/* notification dropdown */
.notif-list { display: flex; flex-direction: column; gap: 0; }
.notif-row {
  display: grid; grid-template-columns: 8px 1fr auto; gap: 12px;
  padding: 14px 0;
  border-top: 1px dashed var(--rule);
  align-items: flex-start;
}
.notif-row:first-child { border-top: none; }
.notif-row .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 7px; background: var(--forest); }
.notif-row .dot.warn { background: var(--ochre-deep); }
.notif-row .dot.berry { background: var(--berry); }
.notif-row .when { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .1em; color: var(--ink-faint); }
.notif-row .body { font-size: 13.5px; color: var(--ink); }
.notif-row .body b { color: var(--forest-deep); }

/* search results */
.search-results { display: flex; flex-direction: column; gap: 4px; }
.search-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 10px; cursor: pointer;
  transition: background .15s;
}
.search-row:hover { background: var(--moss-pale); }
.search-row .av { width: 32px; height: 32px; border-radius: 50%; display:grid; place-items:center;
  background: var(--paper-card); font-family: 'Instrument Serif', serif; font-style: italic; font-size: 14px;
  border: 1px solid var(--rule); flex-shrink: 0;
}
.search-row .what { font-size: 13.5px; font-weight: 600; }
.search-row .where { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .1em; color: var(--ink-faint); text-transform: uppercase; }
.search-empty { padding: 32px 0; text-align: center; color: var(--ink-faint); font-family: 'Instrument Serif', serif; font-style: italic; font-size: 18px; }

/* compact info rows */
.kv-row { display: grid; grid-template-columns: 130px 1fr; gap: 12px; padding: 10px 0; border-top: 1px dashed var(--rule); align-items: baseline; }
.kv-row:first-child { border-top: none; }
.kv-row .k { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: .12em; color: var(--ink-faint); text-transform: uppercase; }
.kv-row .v { font-size: 14px; }

/* attendance cell editable */
.att-cell { cursor: pointer; transition: background .15s; }
.att-cell:hover { background: var(--moss-pale); }
.att-cell.editing { background: var(--ochre-pale); outline: 1px solid var(--ochre); }
.mark-picker { display: flex; gap: 6px; padding: 6px; }
.mark-pick {
  width: 36px; height: 36px; display: grid; place-items: center;
  border-radius: 8px; cursor: pointer; border: 1px solid var(--rule);
  background: var(--paper-card); font-size: 16px;
  transition: all .15s;
}
.mark-pick:hover { transform: scale(1.05); }
.mark-pick.present { background: var(--moss-pale); color: var(--forest); border-color: var(--moss); }
.mark-pick.late    { background: var(--ochre-pale); color: var(--ochre-deep); border-color: oklch(0.83 0.08 78); }
.mark-pick.absent  { background: var(--berry-pale); color: var(--berry); border-color: oklch(0.78 0.06 30); }
.mark-pick.makeup  { background: oklch(0.93 0.025 305); color: oklch(0.4 0.08 305); border-color: oklch(0.82 0.05 305); }
.mark-pick.skip    { color: var(--ink-faint); }

/* contact actions */
.contact-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.contact-act {
  display: flex; flex-direction: column; gap: 6px;
  padding: 16px 14px;
  border: 1px solid var(--rule); border-radius: 12px;
  background: var(--paper-card);
  cursor: pointer; text-align: left;
  transition: all .15s;
  font-family: 'Manrope', sans-serif;
}
.contact-act:hover { background: var(--moss-pale); border-color: var(--moss); }
.contact-act .ic-circle {
  width: 36px; height: 36px; border-radius: 50%; background: var(--paper);
  display:grid; place-items:center; color: var(--forest);
  border: 1px solid var(--rule);
}
.contact-act .name { font-size: 13.5px; font-weight: 600; color: var(--ink); }
.contact-act .sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .1em; color: var(--ink-faint); text-transform: uppercase; }

/* sched-block clickable */
.sched-block { cursor: pointer; transition: box-shadow .15s, filter .15s; }
.sched-block:hover { box-shadow: 0 8px 16px -8px rgba(40,30,15,.25); filter: brightness(0.96); }

/* lesson-row clickable */
.lesson-row { cursor: pointer; transition: background .15s; }
.lesson-row:hover { background: var(--moss-pale); }

/* alert-row clickable */
.alert-row .alert-act { cursor: pointer; }
.alert-row .alert-act:hover { background: var(--forest); color: oklch(0.97 0.02 85); border-color: var(--forest); }

/* group buttons */
.group-card .btn { cursor: pointer; }

/* button cursor */
button, .btn, .icon-btn, [role="button"] { cursor: pointer; }

/* day view (schedule) */
.sched-day {
  display: grid; grid-template-columns: 70px 1fr;
  border: 1px solid var(--rule);
  border-radius: 12px;
  background: var(--paper-card);
  overflow: hidden;
}
.sched-day-times {
  background: var(--paper-deep);
  border-right: 1px solid var(--rule);
  padding: 14px 0;
}
.sched-day-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: .1em; color: var(--ink-faint);
  text-align: right; padding-right: 12px;
}
.sched-day-col { position: relative; padding: 14px 0; }
.sched-day-line {
  position: absolute; left: 0; right: 0; height: 0;
  border-top: 1px dashed var(--rule);
}

/* compact pill buttons inline */
.btn[disabled], button[disabled] { opacity: .5; cursor: not-allowed; }

/* prevent text selection on quick taps */
.choice, .mark-pick, .contact-act, .sheet-close { user-select: none; }


/* ——— Editable skills ——— */
.link-btn {
  background: none; border: none; padding: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: .12em;
  color: var(--ink-faint); text-transform: uppercase;
  cursor: pointer;

}
.link-btn:hover { color: var(--berry); }

.skill-editable .skill-row { align-items: center; gap: 10px; }
.skill-name-clickable {

.skill-name-input {

.skill-val-input::-webkit-outer-spin-button,

.skill-val-input:hover { border-color: var(--rule); }

.skill-del {

.skill-range {

  z-index: 2;
}
.skill-editable { position: relative; }
.skill-editable .skill-bar { position: relative; z-index: 1; }

.skill-add {
  margin-top: 8px;
  width: 100%;
  padding: 10px 12px;
  border: 1px dashed var(--rule);
  border-radius: 10px;
  background: transparent;
  color: var(--ink-faint);
  cursor: pointer;
  font-family: 'Manrope', sans-serif;
  font-size: 12.5px;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .15s;
}
.skill-add:hover {
  border-color: var(--forest-soft);
  color: var(--forest);
  background: var(--moss-pale);
  border-style: solid;
}

<script data-presets="react">
// МойКласс — единое хранилище данных
// При первом запуске берёт демо-данные, всё дальнейшее сохраняется в localStorage

// ── Unified Store ──
window.MK_STORE = (() => {
  const load = () => { try { return JSON.parse(localStorage.getItem(MK_LS_KEY)||'null'); } catch { return null; } };
  const save = (d) => { try { localStorage.setItem(MK_LS_KEY, JSON.stringify(d)); } catch {} };

  let _data = load();
  if (!_data || !_data.students || !_data.students.length) {
    _data = { students: DEMO_STUDENTS, groups: DEMO_GROUPS };
    save(_data);
  }

  const _subs = new Set();
  const _emit = () => _subs.forEach(cb => { try { cb(); } catch (e) { console.error(e); } });
  const _commit = () => { save(_data); _emit(); };

  return {
    get students() { return _data.students; },
    get groups() { return _data.groups; },

    subscribe(cb) { _subs.add(cb); return () => _subs.delete(cb); },

    // Students
    setStudents(s) { _data.students = s; _commit(); },
    updateStudent(id, updater) {
      _data.students = _data.students.map(s => s.id === id ? (typeof updater === 'function' ? updater({...s}) : {...s,...updater}) : s);
      _commit();
    },
    addStudent(s) { _data.students = [..._data.students, s]; _commit(); },
    removeStudent(id) { _data.students = _data.students.filter(s => s.id !== id); _commit(); },

    // Groups
    setGroups(g) { _data.groups = g; _commit(); },
    updateGroup(id, upd) { _data.groups = _data.groups.map(g => g.id === id ? {...g,...upd} : g); _commit(); },
    addGroup(g) { _data.groups = [..._data.groups, g]; _commit(); },
    removeGroup(id) { _data.groups = _data.groups.filter(g => g.id !== id); _commit(); },

    // Utils
    getStudent(id) { return _data.students.find(s => s.id === id); },
    getGroup(id) { return _data.groups.find(g => g.id === id); },
    getGroupName(id) { return _data.groups.find(g => g.id === id)?.name || ''; },
    getGroupStudents(gid) { return _data.students.filter(s => s.groupId === gid); },
  };
})();

// ── Алерты учителя — автогенерация из реальных данных + хранение "прочитано" ──
const MK_ALERTS_READ_KEY = 'mk.alerts.read';
window.MK_ALERTS = (() => {
  const _load = () => { try { return new Set(JSON.parse(localStorage.getItem(MK_ALERTS_READ_KEY) || '[]')); } catch { return new Set(); } };
  const _save = (s) => { try { localStorage.setItem(MK_ALERTS_READ_KEY, JSON.stringify([...s])); } catch {} };
  const _subs = new Set();
  let _read = _load();

  const _compute = () => {
    const out = [];
    const students = (window.MK_STORE && window.MK_STORE.students) || [];
    const now = new Date();

    // 1) Ожидающие оплаты
    for (const s of students) {
      for (const e of (s.events || [])) {
        if (e.type !== 'payment-pending') continue;
        out.push({
          id: `pay-pending:${s.id}:${e.date}`,
          when: e.date,
          kind: 'warn',
          body: `<b>${s.name}</b> — ждём оплату: ${e.note}`,
          target: { type: 'student', id: s.id },
          cta: 'Открыть карточку',
        });
      }
    }

    // 2) Пакет на исходе / закончился
    for (const s of students) {
      const left = (s.pack || 0) - (s.used || 0);
      if (left === 1) {
        out.push({
          id: `low:${s.id}`,
          when: 'сейчас',
          kind: 'warn',
          body: `У <b>${s.name}</b> остался <b>1 урок</b> из ${s.pack}`,
          target: { type: 'student', id: s.id },
          cta: 'Продлить пакет',
          action: 'renew',
        });
      } else if (left <= 0 && s.status !== 'ended') {
        out.push({
          id: `empty:${s.id}`,
          when: 'сейчас',
          kind: 'berry',
          body: `<b>${s.name}</b> — <b>пакет израсходован</b>`,
          target: { type: 'student', id: s.id },
          cta: 'Продлить пакет',
          action: 'renew',
        });
      }
    }

    // 3) Недавние оплаты (7 дней)
    for (const s of students) {
      for (const e of (s.events || [])) {
        if (e.type !== 'payment') continue;
        const m = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(e.date || '');
        if (!m) continue;
        const eDate = new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]));
        const daysAgo = Math.round((now - eDate) / (24 * 3600 * 1000));
        if (daysAgo < 0 || daysAgo > 7) continue;
        const rub = (e.note || '').match(/([\d\s ]+)\s*₽/);
        const amt = rub ? rub[1].trim().replace(/\s+/g, ' ') : '';
        out.push({
          id: `paid:${s.id}:${e.date}`,
          when: e.date.slice(0, 5),
          kind: 'good',
          body: `<b>${s.name}</b> оплатила пакет${amt ? ' — ' + amt + ' ₽' : ''}`,
          target: { type: 'student', id: s.id },
          cta: 'Открыть карточку',
        });
      }
    }

    // Сортировка: непрочитанные сверху
    return out;
  };

  return {
    get items() { return _compute().map(a => ({ ...a, read: _read.has(a.id) })); },
    get unreadCount() { return _compute().filter(a => !_read.has(a.id)).length; },
    markRead(id) { _read.add(id); _save(_read); _subs.forEach(cb => { try { cb(); } catch (e) { console.error(e); } }); },
    markAllRead() { for (const a of _compute()) _read.add(a.id); _save(_read); _subs.forEach(cb => { try { cb(); } catch (e) { console.error(e); } }); },
    subscribe(cb) { _subs.add(cb); return () => _subs.delete(cb); },
  };
})();

      const short = s.short || s.name.split(' ')[0];
      // Положительный — много 'done' подряд
      const recent = lessons.slice(-6);
      const recentDone = recent.filter(l => l.status === 'done').length;
      if (recentDone >= 4) {
        out.push({
          kind: 'up', name: short, color: 'var(--forest)', icon: '↗',
          hint: `${recentDone} из ${recent.length} последних уроков проведены`,
          text: 'Стабильно ходит — поддерживаем темп.',
        });
      }
      // Болезнь / переносы
      const sickCount = lessons.filter(l => l.status === 'sick' || l.status === 'sick-wait').length;
      if (sickCount >= 2) {
        out.push({
          kind: 'warn', name: short, color: 'var(--ochre-deep)', icon: '⌛',
          hint: `${sickCount} переносов по болезни`,
          text: 'Уточнить у родителей о здоровье.',
        });
      }
      // Пакет на исходе
      const left = (s.pack || 0) - (s.used || 0);
      if (left === 1) {
        out.push({
          kind: 'urgent', name: short, color: 'var(--berry)', icon: '!',
          hint: `остался ${left} урок из ${s.pack}`,
          text: 'Напомнить о продлении абонемента.',
        });
      }
    }
    return out.slice(0, 3);
  };
  return { get items() { return compute(); } };
})();

// ── Профиль учителя (имя, роль) — отдельный мини-store с подпиской ──
const MK_PROFILE_KEY = 'mk.profile';
window.MK_PROFILE = (() => {
  const _load = () => { try { return JSON.parse(localStorage.getItem(MK_PROFILE_KEY) || 'null') || null; } catch { return null; } };
  const _save = (d) => { try { localStorage.setItem(MK_PROFILE_KEY, JSON.stringify(d)); } catch {} };
  const _subs = new Set();
  let _data = _load() || { name: 'Анна Сергеевна', role: 'репетитор', timezone: 'Москва · GMT+3', defaultPrice: 1600 };
  return {
    get data() { return _data; },
    subscribe(cb) { _subs.add(cb); return () => _subs.delete(cb); },
    update(patch) {
      _data = { ..._data, ...patch };
      _save(_data);
      _subs.forEach(cb => { try { cb(); } catch (e) { console.error(e); } });
    },
  };
})();

// ── Lesson statuses (used by per-student & by group bulk conduct UIs) ──
window.MK_LESSON_LABELS = {
  future: 'Запланировано', done: 'Проведено', transfer: 'Отработка',
  sick: 'Перенос', 'sick-wait': 'Жду справку', freeze: 'Заморожено', refund: 'Возврат'
};
window.MK_LESSON_STATUSES = [
  { k:'done',      label:'✓ Проведено',              color:'var(--forest)' },
  { k:'future',    label:'○ Запланировано',          color:'var(--ink-faint)' },
  { k:'transfer',  label:'↪ Отработка',              color:'var(--ochre-deep)' },
  { k:'sick-wait', label:'🤒 Болезнь — жду справку', color:'var(--ochre-deep)' },
  { k:'sick',      label:'📋 Болезнь — перенос',     color:'var(--ochre-deep)' },
  { k:'freeze',    label:'❄ Заморожено',             color:'var(--sky)' },
  { k:'refund',    label:'↩ Возврат',                color:'var(--berry)' },
];

// ── Schedule overrides (per-date cancellations + extra lessons) ──
const MK_OVR_KEY = 'mk.schedule.overrides';
window.MK_SCHEDULE = (() => {
  const _load = () => { try { return JSON.parse(localStorage.getItem(MK_OVR_KEY) || '{}') || {}; } catch { return {}; } };
  const _save = (d) => { try { localStorage.setItem(MK_OVR_KEY, JSON.stringify(d)); } catch {} };
  const _subs = new Set();
  let _data = _load();

  const fmtDate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  // Цвет группы → tone-класс блока в Расписании
  const _toneForColor = (hex) => {
    const c = (hex || '').toLowerCase();
    if (c.includes('3e5f4b') || c.includes('1f3a2e') || c.includes('4a6b3e')) return 'green';
    if (c.includes('9b6b2f') || c.includes('6b6024') || c.includes('7c5a2e')) return 'ochre';
    if (c.includes('2c5f77') || c.includes('3d4f7a')) return 'sky';
    if (c.includes('8c4a4a') || c.includes('7a4a2e')) return 'berry';
    if (c.includes('5a4b7c') || c.includes('5e3d6b')) return 'violet';
    return 'green';
  };

  // Объединённый шаблон недели: статичный MK_DATA.week + автогенерация из MK_STORE.groups[].schedule
  const getEffectiveTemplate = () => {
    const staticT = window.MK_DATA.week || [];
    const dayMap = {'вс':0,'пн':1,'вт':2,'ср':3,'чт':4,'пт':5,'сб':6};
    const fromGroups = [];
    for (const g of (window.MK_STORE?.groups || [])) {
      for (const slot of (g.schedule || [])) {
        const m = String(slot).toLowerCase().match(/(вс|пн|вт|ср|чт|пт|сб)\s*(\d{1,2}):(\d{2})/);
        if (!m) continue;
        // День в формате 0-6 где 0=Пн (как в шаблоне), а dayMap 0=Вс. Переводим: dayMap дает 0-6 как JS getDay, нам нужен 0=Пн => (jsDay+6)%7
        const jsDay = dayMap[m[1]];
        const day = (jsDay + 6) % 7;
        const startH = +m[2] + +m[3]/60;
        // Дубликат? — пропускаем
        const dup = staticT.some(b => b.group && b.groupId === g.id && b.day === day && Math.abs(b.start - startH) < 0.05);
        if (dup) continue;
        // Также не дублируем уже сгенерированные слоты для этой группы
        const dupGen = fromGroups.some(b => b.groupId === g.id && b.day === day && Math.abs(b.start - startH) < 0.05);
        if (dupGen) continue;
        fromGroups.push({
          id: `gt_${g.id}_${day}_${m[2]}${m[3]}`,
          day, start: startH, end: startH + 1,
          groupId: g.id,
          subject: g.focus || g.name || 'Занятие',
          tone: _toneForColor(g.color),
          group: true,
        });
      }
    }
    return [...staticT, ...fromGroups];
  };

  return {
    fmtDate,
    getEffectiveTemplate,
    get overrides() { return _data; },
    subscribe(cb) { _subs.add(cb); return () => _subs.delete(cb); },

    isCancelled(dateKey, lessonId) {
      return (_data[dateKey]?.cancelled || []).includes(lessonId);
    },

    toggleCancel(dateKey, lessonId) {
      const next = { ..._data };
      const day = { ...(next[dateKey] || {}) };
      const list = [...(day.cancelled || [])];
      const i = list.indexOf(lessonId);
      if (i >= 0) list.splice(i, 1); else list.push(lessonId);
      day.cancelled = list;
      if ((day.cancelled||[]).length === 0 && (day.extra||[]).length === 0) delete next[dateKey];
      else next[dateKey] = day;
      _data = next; _save(_data); _subs.forEach(cb => { try { cb(); } catch (e) { console.error(e); } });
    },

    addExtra(dateKey, lesson) {
      const next = { ..._data };
      const day = { ...(next[dateKey] || {}) };
      const extra = [...(day.extra || []), { ...lesson, id: lesson.id || `e_${Date.now()}_${Math.random().toString(36).slice(2,6)}` }];
      day.extra = extra; next[dateKey] = day;
      _data = next; _save(_data); _subs.forEach(cb => { try { cb(); } catch (e) { console.error(e); } });
    },

    removeExtra(dateKey, lessonId) {
      const next = { ..._data };
      const day = { ...(next[dateKey] || {}) };
      day.extra = (day.extra || []).filter(l => l.id !== lessonId);
      if ((day.cancelled||[]).length === 0 && day.extra.length === 0) delete next[dateKey];
      else next[dateKey] = day;
      _data = next; _save(_data); _subs.forEach(cb => { try { cb(); } catch (e) { console.error(e); } });
    },

    // Эффективные уроки на конкретную дату: шаблон по дню недели + extras − cancelled
    lessonsForDate(date) {
      const day = (date.getDay() + 6) % 7;
      const key = fmtDate(date);
      const ovr = _data[key] || {};
      const cancelled = new Set(ovr.cancelled || []);
      const fromTemplate = getEffectiveTemplate()
        .filter(t => t.day === day)
        .map(t => ({ ...t, date: key, canceled: cancelled.has(t.id) }));
      const extras = (ovr.extra || []).map(l => ({ ...l, date: key, day }));
      return [...fromTemplate, ...extras].sort((a, b) => a.start - b.start);
    },
  };
})();

</script>
