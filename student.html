<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточка ученика</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app" id="app" style="display:none">
  <header>
    <a href="index.html" class="back-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </a>
    <h1 id="pageTitle">Ученик</h1>
    <button class="btn btn-ghost btn-sm" id="editStudentBtn">✏️</button>
  </header>

  <div class="main">
    <!-- Абонемент -->
    <div id="subCard"></div>

    <!-- Группа / Расписание -->
    <div class="section-header">
      <span class="section-title">Расписание</span>
    </div>
    <div id="scheduleBlock" class="card"></div>

    <!-- Кнопки действий -->
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px">
      <button class="btn btn-primary btn-sm" id="addLessonBtn">✅ Отметить занятие</button>
      <button class="btn btn-ghost btn-sm" id="addRescheduleBtn">🔄 Перенос</button>
      <button class="btn btn-ghost btn-sm" id="addFreezeBtn">❄️ Заморозка</button>
      <button class="btn btn-ghost btn-sm" id="newSubBtn">💳 Новый абонемент</button>
    </div>

    <!-- Ссылка для родителей -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Ссылка для родителей</div>
      <div style="display:flex; gap:8px; align-items:center">
        <input class="form-input" id="parentLink" readonly style="font-size:12px; color: var(--gray-500)">
        <button class="btn btn-ghost btn-sm" id="copyLinkBtn">📋 Копировать</button>
      </div>
    </div>

    <!-- История -->
    <div class="section-header">
      <span class="section-title">История</span>
    </div>
    <div id="timeline" class="timeline"></div>
  </div>
</div>

<!-- Modal: редактировать ученика -->
<div class="modal-overlay" id="editStudentModal">
  <div class="modal">
    <div class="modal-title">Редактировать ученика</div>
    <div class="form-group">
      <label class="form-label">Имя ученика *</label>
      <input class="form-input" id="esName">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Имя родителя</label>
        <input class="form-input" id="esParentName">
      </div>
      <div class="form-group">
        <label class="form-label">Телефон</label>
        <input class="form-input" id="esParentPhone" type="tel">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Группа</label>
      <select class="form-select" id="esGroupId"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Заметка</label>
      <textarea class="form-textarea" id="esNote"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger btn-sm" id="deleteStudentBtn">Удалить</button>
      <button class="btn btn-ghost" id="editStudentCancel">Отмена</button>
      <button class="btn btn-primary" id="editStudentSave">Сохранить</button>
    </div>
  </div>
</div>

<!-- Modal: новый абонемент -->
<div class="modal-overlay" id="subModal">
  <div class="modal">
    <div class="modal-title">Новый абонемент</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Дата оплаты *</label>
        <input class="form-input" id="subPaidDate" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Кол-во занятий *</label>
        <input class="form-input" id="subTotal" type="number" min="1" max="50" placeholder="8">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Сумма оплаты (₽)</label>
      <input class="form-input" id="subAmount" type="number" placeholder="3000">
    </div>
    <div class="form-group">
      <label class="form-label">Заметка</label>
      <input class="form-input" id="subNote" placeholder="Оплата наличными...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="subModalCancel">Отмена</button>
      <button class="btn btn-primary" id="subModalSave">Сохранить</button>
    </div>
  </div>
</div>

<!-- Modal: отметить занятие -->
<div class="modal-overlay" id="lessonModal">
  <div class="modal">
    <div class="modal-title">Отметить занятие</div>
    <div class="form-group">
      <label class="form-label">Дата занятия *</label>
      <input class="form-input" id="lDate" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Заметка</label>
      <input class="form-input" id="lNote" placeholder="Всё прошло хорошо...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="lessonModalCancel">Отмена</button>
      <button class="btn btn-primary" id="lessonModalSave">✅ Отметить</button>
    </div>
  </div>
</div>

<!-- Modal: перенос -->
<div class="modal-overlay" id="rescheduleModal">
  <div class="modal">
    <div class="modal-title">🔄 Перенос занятия</div>
    <div class="form-group">
      <label class="form-label">Перенос с какого числа *</label>
      <input class="form-input" id="rFrom" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Перенос на какое число *</label>
      <input class="form-input" id="rTo" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Причина</label>
      <input class="form-input" id="rReason" placeholder="Болезнь, поездка...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="rescheduleModalCancel">Отмена</button>
      <button class="btn btn-primary" id="rescheduleModalSave">Сохранить</button>
    </div>
  </div>
</div>

<!-- Modal: заморозка -->
<div class="modal-overlay" id="freezeModal">
  <div class="modal">
    <div class="modal-title">❄️ Заморозка абонемента</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">С какого числа *</label>
        <input class="form-input" id="fFrom" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">По какое число *</label>
        <input class="form-input" id="fTo" type="date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Причина</label>
      <input class="form-input" id="fReason" placeholder="Отпуск, болезнь...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="freezeModalCancel">Отмена</button>
      <button class="btn btn-primary" id="freezeModalSave">Сохранить</button>
    </div>
  </div>
</div>

<script type="module" src="js/student-page.js"></script>
</body>
</html>
