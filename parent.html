<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Абонемент</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div id="loadingState" style="min-height:100dvh;display:flex;align-items:center;justify-content:center">
    <div style="text-align:center;color:var(--gray-500)">
      <div style="font-size:40px;margin-bottom:12px">⏳</div>
      <p>Загрузка...</p>
    </div>
  </div>

  <div id="pageContent" style="display:none">
    <div class="parent-header">
      <div style="font-size:36px;margin-bottom:8px">👤</div>
      <h1 id="pStudentName">—</h1>
      <p id="pGroupName">—</p>
    </div>

    <div style="max-width:680px;margin:0 auto;padding:16px">

      <!-- Абонемент -->
      <div id="pSubCard"></div>

      <!-- Расписание -->
      <div class="card" style="margin-bottom:12px">
        <div class="card-title">Расписание занятий</div>
        <div id="pSchedule"></div>
      </div>

      <!-- Ближайшие занятия/переносы -->
      <div class="card" style="margin-bottom:12px">
        <div class="card-title">Ближайшие события</div>
        <div id="pUpcoming"></div>
      </div>

      <!-- История -->
      <div class="section-header">
        <span class="section-title">История</span>
      </div>
      <div id="pTimeline" class="timeline"></div>
    </div>
  </div>

  <div id="notFoundState" style="display:none">
    <div class="empty-state">
      <div class="icon">🔍</div>
      <p>Страница не найдена</p>
    </div>
  </div>
</div>

<script type="module" src="js/parent-page.js"></script>
</body>
</html>
